root    = "."
tmp_dir = "tmp"

[build]
  bin           = "./tmp/main"
  cmd           = "go build -o ./tmp/main ./cmd/api/main.go"
  delay         = 500
  exclude_dir   = ["tmp", "vendor", "data", "migrations", "testdata"]
  include_ext   = ["go", "env"]
  exclude_regex = ["_test\\.go"]
  kill_delay    = "200ms"
  log           = "tmp/build-errors.log"
  stop_on_error = true
  send_interrupt = true
  rerun         = false

[color]
  build   = "yellow"
  runner  = "green"
  watcher = "cyan"
  main    = "magenta"
  app     = "white"

[log]
  time      = true
  main_only = false

[misc]
  clean_on_exit        = true
  unique_dir_for_unique_pid = false

[screen]
  clear_on_rebuild = true
  keep_scroll      = false
